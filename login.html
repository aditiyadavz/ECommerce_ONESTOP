<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ONE STOP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <section id="login-page">
        <div class="login-container">
            <img src="img/logo.png" style="width:80px;margin-bottom:16px" alt="ONE STOP">
            <h2>Welcome Back</h2>
            <p style="color:#888;font-size:13px;margin-bottom:24px">Sign in to your account</p>

            <div class="input-field">
                <label for="username">Username / Email</label>
                <input type="text" id="username" name="username" placeholder="you@example.com" required>
            </div>
            <div class="input-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color:#088178;font-weight:600">Forgot Password?</a>
            </div>

            <div class="submit-btn">
                <a href="index.html" class="login-button">Login</a>
            </div>

            <div class="register-link">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </div>
    </section>

</body>
</html>
